<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 숫자 생성기</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 25px;
            font-size: 1.2em;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
        <h1>랜덤 숫자 생성기</h1>
        <button id="generateButton">숫자 생성하기</button>
        <div id="result"></div>
</div>

<script>
        document.getElementById('generateButton').addEventListener('click', generateRandomNumbers);

        function generateRandomNumbers() {
            // 1부터 100 사이의 무작위 정수 5개를 생성합니다.
        const numbers = [];
            for (let i = 0; i < 5; i++) {
                // Math.floor(Math.random() * 100) + 1 : 1부터 100 사이의 난수를 생성
                const randomNumber = Math.floor(Math.random() * 100) + 1;
                numbers.push(randomNumber);
            }

            // 배열의 숫자를 문자열로 변환하고 쉼표로 구분하여 표시합니다.
            const resultString = numbers.join(', ');
            document.getElementById('result').textContent = `생성된 숫자: ${numbers.join(', ')}`;
        }
    </script>
</body>
</html>
